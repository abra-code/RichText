<p>A basic table:</p>
<table style="border-collapse:collapse;margin:0.5em 0">
<thead>

<p>Per-column alignment:</p>
<table style="border-collapse:collapse;margin:0.5em 0">
<thead>
<tr><th style="border:1px solid #c8c8c8;padding:5px 7px;background:#f0f0f0;text-align:left">Left</th><th style="border:1px solid #c8c8c8;padding:5px 7px;background:#f0f0f0;text-align:center">Center</th><th style="border:1px solid #c8c8c8;padding:5px 7px;background:#f0f0f0;text-align:right">Right</th><th style="border:1px solid #c8c8c8;padding:5px 7px;background:#f0f0f0">Default</th></tr>
</thead>
<tbody>
<tr><td style="border:1px solid #c8c8c8;padding:5px 7px;text-align:left">a</td><td style="border:1px solid #c8c8c8;padding:5px 7px;text-align:center">b</td><td style="border:1px solid #c8c8c8;padding:5px 7px;text-align:right">c</td><td style="border:1px solid #c8c8c8;padding:5px 7px">d</td></tr>

</tbody>
</table>
<p>Inline markup inside cells:</p>
<table style="border-collapse:collapse;margin:0.5em 0">
<thead>
<tr><th style="border:1px solid #c8c8c8;padding:5px 7px;background:#f0f0f0">Feature</th><th style="border:1px solid #c8c8c8;padding:5px 7px;background:#f0f0f0">Note</th></tr>
</thead>
<tbody>
<tr><td style="border:1px solid #c8c8c8;padding:5px 7px"><strong>bold</strong></td><td style="border:1px solid #c8c8c8;padding:5px 7px">a <code style="background:#f0f0f0;border-radius:4px;padding:0.1em 0.3em;font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;font-size:0.94em">code</code> cell</td></tr>
<tr><td style="border:1px solid #c8c8c8;padding:5px 7px">a <a href="https://swift.org" style="color:#0066cc">link</a></td><td style="border:1px solid #c8c8c8;padding:5px 7px"><del>struck</del></td></tr>

</table>
