<p>A block image on its own line:</p>
<p><img src="https://example.test/diagram.png" alt="a remote diagram" style="max-width:100%"></p>
<p>An inline <img src="https://example.test/icon.png" alt="small icon" style="max-width:100%"> inside a sentence.</p>
<p>An image with an empty alt: <img src="https://example.test/nameless.png" alt="" style="max-width:100%"></p>
<p>A data-URI image <img src="data:image/png;base64,iVBORw0KGgo=" alt="pixel" style="max-width:100%"> inline.</p>
<p>A disallowed file image local falls back to alt text.</p>
